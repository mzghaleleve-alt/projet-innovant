

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Temple RA - FLL</title>

  <!-- A-Frame et AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar-js-org@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  shadow="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true; precision: mediump;"
>

  <!-- Définition des assets 3D -->
  <a-assets>
    <!-- On garde l'id pour la sécurité, mais on va l'appeler directement -->
    <a-asset-item id="templeModel" src="parthenon.glb"></a-asset-item>
  </a-assets>

  <!-- MARKER : barcode marker (ID = 10) pour plus de simplicité -->
  <a-marker type="barcode" value="10">
    <!-- Optionnel : un cube pour tester le marker -->
    <a-box position="0 0.5 0" material="color: red;" scale="0.2 0.2 0.2"></a-box>

    <!-- Modèle 3D du temple -->
    <a-entity
      gltf-model="parthenon.glb"   <!-- on utilise le chemin direct -->
      scale="0.05 0.05 0.05"
      position="0 0 0"
      rotation="0 0 0"
      animation-mixer   <!-- si le modèle a des animations -->
    >
    </a-entity>
  </a-marker>

  <!-- Caméra -->
  <a-entity camera></a-entity>

</a-scene>

<!-- Gestion des erreurs de chargement -->
<script>
  const model = document.querySelector('#templeModel');
  model.addEventListener('error', () => {
    alert("Erreur : le modèle 3D ne s'est pas chargé. Vérifie le fichier parthenon.glb et le chemin.");
  });
</script>

</body>
</html>
